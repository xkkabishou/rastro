<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastro</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "PingFang SC", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(14, 116, 144, 0.14), transparent 42%),
          linear-gradient(180deg, #f8fbfd 0%, #eef4f6 100%);
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 48px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 2.6rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rastro</h1>
      <p>Wave 1a Rust 后端骨架已接入。此页面仅用于验证 Tauri 2 窗口与 IPC 壳层可正常启动。</p>
    </main>
  </body>
</html>
