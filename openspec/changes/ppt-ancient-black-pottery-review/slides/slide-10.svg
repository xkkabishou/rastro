<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="32" fill="#27272a" font-weight="700">层级化分析方法体系</text>
  <text x="60" y="72" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#71717a">无损筛查 → 微损定性 → 微区定量：三级递进式分析策略</text>

  <!-- ==================== Top Flow Diagram ==================== -->
  <!-- Box 1 -->
  <g filter="url(#shadow-md)">
    <rect x="80" y="94" width="320" height="56" rx="8" fill="#3b82f6"/>
  </g>
  <text x="240" y="118" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600">第一级：无损筛查</text>
  <text x="240" y="138" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#ffffff" opacity="0.85" text-anchor="middle">Non-destructive Screening</text>

  <!-- Arrow 1-2 -->
  <line x1="400" y1="122" x2="470" y2="122" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 2 -->
  <g filter="url(#shadow-md)">
    <rect x="480" y="94" width="320" height="56" rx="8" fill="#3b82f6" opacity="0.8"/>
  </g>
  <text x="640" y="118" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600">第二级：微损定性</text>
  <text x="640" y="138" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#ffffff" opacity="0.85" text-anchor="middle">Micro-destructive Characterization</text>

  <!-- Arrow 2-3 -->
  <line x1="800" y1="122" x2="870" y2="122" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3 -->
  <g filter="url(#shadow-md)">
    <rect x="880" y="94" width="320" height="56" rx="8" fill="#3b82f6" opacity="0.6"/>
  </g>
  <text x="1040" y="118" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600">第三级：微区定量</text>
  <text x="1040" y="138" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#ffffff" opacity="0.85" text-anchor="middle">Micro-area Quantification</text>

  <!-- ==================== Card 1: 无损筛查 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="40" y="170" width="386" height="520" rx="8" fill="#ffffff"/>
  </g>
  <rect x="40" y="170" width="386" height="4" rx="2" fill="#3b82f6"/>

  <text x="60" y="200" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="16" fill="#3b82f6" font-weight="600">无损筛查</text>
  <line x1="60" y1="210" x2="406" y2="210" stroke="#f0f0f0" stroke-width="1"/>

  <text x="60" y="232" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">体视显微镜</text>
  <text x="60" y="248" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">观察表面形貌特征：涂层/胎体分界线、表面</text>
  <text x="60" y="263" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">光泽度差异、裂纹和剥落情况。8x-50x放大。</text>

  <text x="60" y="288" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">便携 XRF</text>
  <text x="60" y="304" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">快速测定<tspan font-weight="700">Fe</tspan>、<tspan font-weight="700">Mn</tspan>、Ca、K等主量元素含量，</text>
  <text x="60" y="319" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">Fe含量异常高提示铁基致色，<tspan font-weight="700">Mn富集</tspan>提示埋</text>
  <text x="60" y="334" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">藏污染。单点测试不超过60秒。</text>

  <text x="60" y="359" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">色度计</text>
  <text x="60" y="375" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">量化<tspan font-weight="700">CIE L*a*b*</tspan>色度空间参数：L*值反映明</text>
  <text x="60" y="390" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">度（越低越黑），a*和b*值区分红/黄色调差</text>
  <text x="60" y="405" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">异，客观数据替代主观目测。</text>

  <line x1="60" y1="420" x2="406" y2="420" stroke="#f0f0f0" stroke-width="1"/>
  <text x="60" y="442" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#3b82f6" font-weight="600">适用场景</text>
  <text x="60" y="458" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">所有工艺类型的初步分类筛查。可在博物馆展</text>
  <text x="60" y="473" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">厅或田野考古现场直接操作，完全不接触样品。</text>
  <text x="60" y="488" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">适合大批量样品的快速分流：按元素特征将样</text>
  <text x="60" y="503" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">品初分为碳基（Fe正常）、铁基（Fe高）、<tspan font-weight="700">锰</tspan></text>
  <text x="60" y="518" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">污染</tspan>（Mn异常）三类，指导后续精细分析。</text>

  <!-- ==================== Card 2: 微损定性 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="446" y="170" width="388" height="520" rx="8" fill="#ffffff"/>
  </g>
  <rect x="446" y="170" width="388" height="4" rx="2" fill="#3b82f6" opacity="0.8"/>

  <text x="466" y="200" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="16" fill="#3b82f6" font-weight="600">微损定性</text>
  <line x1="466" y1="210" x2="814" y2="210" stroke="#f0f0f0" stroke-width="1"/>

  <text x="466" y="232" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">拉曼光谱 (<tspan font-weight="700">Raman</tspan>)</text>
  <text x="466" y="248" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">检测碳的<tspan font-weight="700">D峰</tspan>(~1350cm⁻¹)/<tspan font-weight="700">G峰</tspan>(~1580cm⁻¹)</text>
  <text x="466" y="263" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">确认<tspan font-weight="700">游离碳</tspan>，670cm⁻¹峰鉴定<tspan font-weight="700">磁铁矿</tspan>(Fe₃O₄)。</text>
  <text x="466" y="278" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">无损/微损，空间分辨率可达~1μm。</text>

  <text x="466" y="303" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600"><tspan font-weight="700">FTIR</tspan> 红外光谱</text>
  <text x="466" y="319" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">识别有机质（C-H、C=O振动）与矿物种类，</text>
  <text x="466" y="334" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">样品需求量极少（μg级），ATR模式近无损。</text>

  <text x="466" y="359" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">偏光显微镜 (<tspan font-weight="700">PLM</tspan>)</text>
  <text x="466" y="375" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">观察矿物取向与光性特征，正交偏光下矿物的</text>
  <text x="466" y="390" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">消光方位</tspan>可判别<tspan font-weight="700">定向排列</tspan>。是区分抛光黑陶与</text>
  <text x="466" y="405" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">其他类型黑陶的关键手段。</text>

  <line x1="466" y1="420" x2="814" y2="420" stroke="#f0f0f0" stroke-width="1"/>
  <text x="466" y="442" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#3b82f6" font-weight="600">代表性研究</text>
  <text x="466" y="460" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">van der Weerd等</tspan>：红外+拉曼联合方案，成功</text>
  <text x="466" y="475" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">区分碳基与铁基黑色颜料，建立互补分析标准。</text>
  <text x="466" y="498" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">Tankova等</tspan>：拉曼+<tspan font-weight="700">SEM-EDS</tspan>联用有效区分铁基</text>
  <text x="466" y="513" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">（<tspan font-weight="700">磁铁矿</tspan>/赤铁矿）与碳基（有机碳/烟炱）两</text>
  <text x="466" y="528" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">大类黑色颜料，为色料来源判定提供标准流程。</text>

  <!-- ==================== Card 3: 微区定量 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="854" y="170" width="386" height="520" rx="8" fill="#ffffff"/>
  </g>
  <rect x="854" y="170" width="386" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>

  <text x="874" y="200" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="16" fill="#3b82f6" font-weight="600">微区定量</text>
  <line x1="874" y1="210" x2="1220" y2="210" stroke="#f0f0f0" stroke-width="1"/>

  <text x="874" y="232" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600"><tspan font-weight="700">SEM-EDS</tspan> 线/面扫描</text>
  <text x="874" y="248" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">碳含量从表面到内部的梯度分布，涂层/胎体</text>
  <text x="874" y="263" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">化学成分突变界面。面扫描揭示元素空间分布。</text>

  <text x="874" y="288" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600"><tspan font-weight="700">穆斯堡尔谱</tspan> (Mössbauer)</text>
  <text x="874" y="304" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">Fe²⁺/Fe³⁺</tspan>比值精确定量，直接区分<tspan font-weight="700">还原气氛</tspan></text>
  <text x="874" y="319" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">（Fe²⁺高）与氧化气氛（Fe³⁺高）。需约100mg</text>
  <text x="874" y="334" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">粉末样品，设备普及率较低。</text>

  <text x="874" y="359" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">SR-μ<tspan font-weight="700">XRD</tspan> 同步辐射微区衍射</text>
  <text x="874" y="375" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">空间分辨率≤10μm的物相分析，无需粉碎样品。</text>
  <text x="874" y="390" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">可对涂层薄层进行原位物相鉴定，区分<tspan font-weight="700">磁铁矿</tspan>、</text>
  <text x="874" y="405" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">赤铁矿等不同铁氧化物。</text>

  <text x="874" y="430" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600"><tspan font-weight="700">EBSD</tspan> 电子背散射衍射</text>
  <text x="874" y="446" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">定量层状矿物<tspan font-weight="700">定向排列</tspan>，提供极图和取向差分</text>
  <text x="874" y="461" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">布数据，用于精确判别<tspan font-weight="700">结构致黑</tspan>。</text>

  <line x1="874" y1="478" x2="1220" y2="478" stroke="#f0f0f0" stroke-width="1"/>
  <text x="874" y="500" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#3b82f6" font-weight="600">代表性研究</text>
  <text x="874" y="518" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a"><tspan font-weight="700">Medeghini等</tspan>：庞贝城黑光陶研究证实，单一分</text>
  <text x="874" y="533" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">析技术无法确定完整工艺链，必须<tspan font-weight="700">多技术联用</tspan></text>
  <text x="874" y="548" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">（SEM-EDS + Raman + XRD + <tspan font-weight="700">穆斯堡尔谱</tspan>）才</text>
  <text x="874" y="563" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">能可靠重建烧制工艺全貌。</text>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">10</text>
</svg>