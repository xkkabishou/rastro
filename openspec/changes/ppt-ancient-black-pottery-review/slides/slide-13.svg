<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="52" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="32" font-weight="700" fill="#27272a">工艺多解性难题</text>
  <!-- Subtitle -->
  <text x="60" y="78" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#71717a">同一物相 ≠ 同一工艺——工艺推断的核心挑战</text>

  <!-- ============ Hero Card (left 2/3) ============ -->
  <rect x="40" y="96" width="790" height="600" rx="8" fill="#ffffff" filter="url(#shadow-md)"/>

  <!-- Section: 磁铁矿的双重来源 -->
  <text x="60" y="126" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#27272a"><tspan font-weight="700">磁铁矿</tspan>的双重来源</text>
  <line x1="60" y1="134" x2="810" y2="134" stroke="#e5e7eb" stroke-width="1"/>

  <circle cx="72" cy="155" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="159"><tspan font-weight="700">Fe&#x2083;O&#x2084;</tspan>既可以是<tspan font-weight="700">还原焙烧</tspan>的产物（胎体整体还原气氛下生成），也可出现在</tspan>
    <tspan x="82" dy="18">三段式黑光陶的涂层中（涂层局部还原而胎体回氧化）</tspan>
  </text>
  <circle cx="72" cy="196" r="3" fill="#3b82f6"/>
  <text x="82" y="200" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">仅凭 <tspan font-weight="700">XRD</tspan> 检测到<tspan font-weight="700">磁铁矿</tspan>，无法直接判断其来源是整体还原还是涂层局部还原</text>

  <!-- Section: 良渚案例的复杂性 -->
  <text x="60" y="232" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#27272a">良渚案例的复杂性</text>
  <line x1="60" y1="240" x2="810" y2="240" stroke="#e5e7eb" stroke-width="1"/>

  <circle cx="72" cy="261" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="265">鲁晓珂等对陶寺遗址分析发现：部分样品黑色陶衣原料本身铁含量较高，</tspan>
    <tspan x="82" dy="18">不经<tspan font-weight="700">渗碳</tspan>处理也能达到黑色效果——这挑战了"黑色=渗碳"的简单等式</tspan>
  </text>
  <circle cx="72" cy="306" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="310">良渚古城案例更为复杂：表面并非专门施加陶衣，而是胎体中加入的有机质</tspan>
    <tspan x="82" dy="18">草木灰在磨光过程中形成了一层低磷泥浆层，外观酷似陶衣却成因迥异</tspan>
  </text>

  <!-- Section: 有损 vs 无损矛盾 -->
  <text x="60" y="362" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#27272a">有损 vs 无损矛盾</text>
  <line x1="60" y1="370" x2="810" y2="370" stroke="#e5e7eb" stroke-width="1"/>

  <circle cx="72" cy="391" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="395"><tspan font-weight="700">穆斯堡尔谱</tspan>学（Mössbauer）需要约 100 mg 粉末样品；<tspan font-weight="700">SEM-EDS</tspan> 需要对样品</tspan>
    <tspan x="82" dy="18">进行切截、镶嵌和抛光处理——这些均属有损分析方法</tspan>
  </text>
  <circle cx="72" cy="436" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="440">龙山蛋壳黑陶等薄壁珍贵器物（壁厚仅 0.3-0.5 mm）难以接受有损取样，</tspan>
    <tspan x="82" dy="18">任何破坏都可能造成不可逆损失</tspan>
  </text>
  <circle cx="72" cy="479" r="3" fill="#3b82f6"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="82" y="483">该矛盾在宋代建盏等黑釉研究中同样突出——珍贵样品与分析需求之间</tspan>
    <tspan x="82" dy="18">存在根本性张力</tspan>
  </text>
  <circle cx="72" cy="520" r="3" fill="#3b82f6"/>
  <text x="82" y="524" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">这一困境促使研究者积极转向<tspan font-weight="700">原位无损分析</tspan>技术（详见 Slide 14）</text>

  <!-- ============ Accent Card (right 1/3) ============ -->
  <rect x="848" y="96" width="392" height="600" rx="8" fill="#3b82f6" filter="url(#shadow-md)"/>

  <text x="872" y="130" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" font-weight="700" fill="#ffffff"><tspan font-weight="700" fill="#ffffff">多元互证</tspan>原则</text>
  <line x1="872" y1="140" x2="1216" y2="140" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Principle 1 -->
  <circle cx="882" cy="164" r="3" fill="#ffffff"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff">
    <tspan x="892" y="168">至少运用两种独立分析方法</tspan>
    <tspan x="892" dy="17">对呈色物质进行<tspan font-weight="700">交叉验证</tspan>，</tspan>
    <tspan x="892" dy="17">避免单一手段的解读偏差</tspan>
  </text>

  <!-- Principle 2 -->
  <circle cx="882" cy="226" r="3" fill="#ffffff"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff">
    <tspan x="892" y="230">结合<tspan font-weight="700">空间分布信息</tspan>做出综合</tspan>
    <tspan x="892" dy="17">判断：碳/铁的分布梯度可有效</tspan>
    <tspan x="892" dy="17">区分<tspan font-weight="700">渗碳</tspan>与涂层工艺</tspan>
  </text>

  <!-- Principle 3 -->
  <circle cx="882" cy="290" r="3" fill="#ffffff"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff">
    <tspan x="892" y="294"><tspan font-weight="700">Amicone 等</tspan>在巴尔干新石器时代</tspan>
    <tspan x="892" dy="17">晚期<tspan font-weight="700">实验考古</tspan>中强调：实验复原</tspan>
    <tspan x="892" dy="17">与仪器分析数据对照是减少</tspan>
    <tspan x="892" dy="17">歧义的关键手段</tspan>
  </text>

  <!-- Principle 4 -->
  <circle cx="882" cy="372" r="3" fill="#ffffff"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff">
    <tspan x="892" y="376">以已知烧成条件制备的<tspan font-weight="700">仿制品</tspan></tspan>
    <tspan x="892" dy="17">作为标准参照，与出土样品的</tspan>
    <tspan x="892" dy="17">微观特征进行系统对比</tspan>
    <tspan x="892" dy="17">→ 有效减少工艺推断歧义</tspan>
  </text>

  <!-- Accent card bottom summary -->
  <line x1="872" y1="444" x2="1216" y2="444" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" font-style="italic">
    <tspan x="872" y="466">核心理念：没有任何单一分析技术</tspan>
    <tspan x="872" dy="16">能够独立解决工艺多解性问题。</tspan>
    <tspan x="872" dy="16">只有<tspan font-weight="700">多方法交叉验证</tspan>、实验复原</tspan>
    <tspan x="872" dy="16">对照与空间信息综合分析三管齐下，</tspan>
    <tspan x="872" dy="16">才能逼近历史工艺真相。</tspan>
  </text>

  <!-- Page Number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">13</text>
</svg>