<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="52" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="32" fill="#27272a" font-weight="700">抛光（结构致黑）</text>
  <!-- Subtitle -->
  <text x="60" y="78" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#71717a">矿物定向排列消除漫反射——不依赖碳或铁物相变化的物理致色路径</text>

  <!-- ==================== Left Card: 原理 + 关键研究 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="40" y="100" width="600" height="590" rx="8" fill="#ffffff"/>
  </g>

  <!-- Card title: 结构致黑原理 -->
  <text x="60" y="132" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="600">结构致黑原理</text>
  <line x1="60" y1="144" x2="620" y2="144" stroke="#f0f0f0" stroke-width="1"/>

  <text x="72" y="168" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="72" dy="0">• 黑色外观不依赖碳沉积或铁物相改变，本质是「<tspan font-weight="700">结构致黑</tspan>」</tspan>
    <tspan x="72" dy="19">• 通过器表精细磨光，使<tspan font-weight="700">层状硅酸盐矿物</tspan>（如云母、绿泥石）<tspan font-weight="700">定向排列</tspan></tspan>
    <tspan x="72" dy="19">• 定向排列消除可见光<tspan font-weight="700">漫反射</tspan> → 呈现深色镜面光泽</tspan>
    <tspan x="72" dy="19">• 矿物颗粒的物理排列改变光学性质，而非化学成分变化</tspan>
  </text>

  <!-- Divider -->
  <line x1="60" y1="256" x2="620" y2="256" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Card title: 关键研究 -->
  <text x="60" y="280" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="600">关键研究</text>
  <line x1="60" y1="292" x2="620" y2="292" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Kim et al. -->
  <text x="72" y="314" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">Kim等</text>
  <text x="72" y="332" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">百济汉城期研磨黑陶：黑色表层未检测到<tspan font-weight="700">碳沉积</tspan>或涂层，呈色</text>
  <text x="72" y="347" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">完全归因于表面矿物颗粒的物理排列，充分验证<tspan font-weight="700">结构致黑</tspan>机理。</text>

  <!-- Blackmore et al. -->
  <text x="72" y="372" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">Blackmore等</text>
  <text x="72" y="390" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">将百济黑陶生产技术与国家形成过程联系，指出<tspan font-weight="700">研磨抛光</tspan>作为</text>
  <text x="72" y="405" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">费工费时的表面处理，具有社会等级标识功能。</text>

  <!-- Maritan et al. -->
  <text x="72" y="430" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">Maritan等</text>
  <text x="72" y="448" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">巴基斯坦巴里科特遗址黑衣陶器：衣层与胎体化学组成差异不大，</text>
  <text x="72" y="463" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">关键是衣层中<tspan font-weight="700">层状矿物</tspan>呈明显<tspan font-weight="700">定向排列</tspan>，产生黑色外观。</text>

  <!-- Choi et al. -->
  <text x="72" y="488" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">Choi等</text>
  <text x="72" y="506" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">百济泗沘期陶器：抛光处理导致表面<tspan font-weight="700">粗糙度</tspan>大幅降低、<tspan font-weight="700">光泽度</tspan></text>
  <text x="72" y="521" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">明显提升，量化验证了研磨工艺的光学效果。</text>

  <!-- Moon et al. -->
  <text x="72" y="546" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">Moon等</text>
  <text x="72" y="564" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a"><tspan font-weight="700">XRD</tspan>分析百济黑陶粘土矿物结构变化，将矿物晶体结构特征</text>
  <text x="72" y="579" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">作为<tspan font-weight="700">烧成温度</tspan>和气氛的指示参数。</text>

  <!-- ==================== Right Card: 判别方法 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="660" y="100" width="580" height="590" rx="8" fill="#ffffff"/>
  </g>

  <!-- Card title -->
  <text x="680" y="132" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="600">科技判别四项指标</text>
  <line x1="680" y1="144" x2="1220" y2="144" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Indicator 1 -->
  <rect x="680" y="160" width="36" height="36" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="698" y="184" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#3b82f6" font-weight="700" text-anchor="middle">①</text>
  <text x="728" y="178" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#27272a" font-weight="600"><tspan font-weight="700">PLM</tspan> 偏光显微镜</text>
  <text x="728" y="198" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">观察到表面矿物的<tspan font-weight="700">同步消光现象</tspan>，这是矿物定向</text>
  <text x="728" y="213" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">排列的直接光学证据。正交偏光下定向排列的层状</text>
  <text x="728" y="228" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">矿物会出现统一的消光方位。</text>

  <!-- Indicator 2 -->
  <rect x="680" y="250" width="36" height="36" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="698" y="274" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#3b82f6" font-weight="700" text-anchor="middle">②</text>
  <text x="728" y="268" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#27272a" font-weight="600"><tspan font-weight="700">EBSD</tspan> 电子背散射衍射</text>
  <text x="728" y="288" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">可定量表征层状矿物（云母、绿泥石等）的<tspan font-weight="700">优选</tspan></text>
  <text x="728" y="303" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a"><tspan font-weight="700">取向</tspan>特征，提供极图和织构指数等定量数据。</text>
  <text x="728" y="318" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">相比 PLM 具有更高的统计可靠性。</text>

  <!-- Indicator 3 -->
  <rect x="680" y="340" width="36" height="36" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="698" y="364" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#3b82f6" font-weight="700" text-anchor="middle">③</text>
  <text x="728" y="358" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#27272a" font-weight="600">AFM 原子力显微镜</text>
  <text x="728" y="378" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">测量表面<tspan font-weight="700">粗糙度</tspan>（Ra值），抛光区域的Ra值显著</text>
  <text x="728" y="393" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">低于未抛光区域。<tspan font-weight="700">Choi等</tspan>的百济陶器研究中，抛</text>
  <text x="728" y="408" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">光面与未抛光面的粗糙度差异达数个数量级。</text>

  <!-- Indicator 4 -->
  <rect x="680" y="430" width="36" height="36" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="698" y="454" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#3b82f6" font-weight="700" text-anchor="middle">④</text>
  <text x="728" y="448" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#27272a" font-weight="600">EDS + <tspan font-weight="700">Raman</tspan> 排除法</text>
  <text x="728" y="468" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">EDS不出现<tspan font-weight="700">游离碳</tspan>(C)异常富集 → 排除<tspan font-weight="700">渗碳</tspan>机制</text>
  <text x="728" y="483" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">Raman不出现670cm⁻¹<tspan font-weight="700">磁铁矿</tspan>峰 → 排除<tspan font-weight="700">还原</tspan>机制</text>
  <text x="728" y="498" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">Raman不出现碳<tspan font-weight="700">D峰</tspan>(~1350cm⁻¹)/<tspan font-weight="700">G峰</tspan>(~1580cm⁻¹)</text>
  <text x="728" y="513" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">→ 排除碳质涂层。三项排除后指向<tspan font-weight="700">结构致黑</tspan>。</text>

  <!-- Summary box -->
  <rect x="680" y="545" width="540" height="130" rx="6" fill="#3b82f6" opacity="0.05"/>
  <text x="700" y="570" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">判别逻辑总结</text>
  <text x="700" y="592" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">结构致黑的判别采用「正面验证 + 排除法」双重策略：<tspan font-weight="700">PLM</tspan>/<tspan font-weight="700">EBSD</tspan></text>
  <text x="700" y="608" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">提供矿物定向的正面证据，AFM量化表面光洁度，EDS+<tspan font-weight="700">Raman</tspan>排</text>
  <text x="700" y="624" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">除碳沉积与铁物相转变，四项指标共同指向<tspan font-weight="700">结构致黑</tspan>机理。</text>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">9</text>
</svg>