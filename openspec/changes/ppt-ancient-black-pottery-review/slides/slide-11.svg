<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="32" fill="#27272a" font-weight="700">主要分析方法比较</text>
  <text x="60" y="72" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#71717a">各方法的检测对象、优势与局限——没有一种方法能解决所有问题，需多方法联用</text>

  <!-- ==================== Table Card ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="40" y="90" width="1200" height="600" rx="8" fill="#ffffff"/>
  </g>

  <!-- Table Header Row -->
  <rect x="40" y="90" width="1200" height="42" rx="8" fill="#3b82f6"/>
  <rect x="40" y="110" width="1200" height="22" fill="#3b82f6"/>

  <text x="68" y="117" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="700">方法</text>
  <text x="210" y="117" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="700">检测对象</text>
  <text x="430" y="117" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="700">优势</text>
  <text x="700" y="117" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="700">局限</text>
  <text x="980" y="117" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="700">典型应用</text>

  <!-- Column dividers (header) -->
  <line x1="195" y1="96" x2="195" y2="132" stroke="#ffffff" opacity="0.2" stroke-width="1"/>
  <line x1="415" y1="96" x2="415" y2="132" stroke="#ffffff" opacity="0.2" stroke-width="1"/>
  <line x1="685" y1="96" x2="685" y2="132" stroke="#ffffff" opacity="0.2" stroke-width="1"/>
  <line x1="965" y1="96" x2="965" y2="132" stroke="#ffffff" opacity="0.2" stroke-width="1"/>

  <!-- ===== Row 1: 拉曼光谱 (white bg) ===== -->
  <rect x="40" y="132" width="1200" height="72" fill="#ffffff"/>

  <text x="68" y="158" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">拉曼光谱</text>
  <text x="68" y="174" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Raman</tspan></text>

  <text x="210" y="155" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">碳相: <tspan font-weight="700">D峰</tspan>(~1350cm⁻¹)</text>
  <text x="210" y="171" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">/ <tspan font-weight="700">G峰</tspan>(~1580cm⁻¹)</text>
  <text x="210" y="187" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">铁氧化物: <tspan font-weight="700">670cm⁻¹</tspan></text>

  <text x="430" y="155" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">无损/微损分析</text>
  <text x="430" y="171" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">空间分辨率高(~1μm)</text>
  <text x="430" y="187" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">可便携现场操作</text>

  <text x="700" y="155" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a"><tspan font-weight="700">荧光干扰</tspan>严重(有机质)</text>
  <text x="700" y="171" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">黑色样品信号普遍弱</text>
  <text x="700" y="187" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">热效应可损伤样品</text>

  <text x="980" y="155" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Scarpelli等</tspan>：庞贝城</text>
  <text x="980" y="171" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">黑涂层陶器碳/铁物</text>
  <text x="980" y="187" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">相鉴定</text>

  <line x1="60" y1="204" x2="1220" y2="204" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 2: XRD (alternating bg) ===== -->
  <rect x="40" y="204" width="1200" height="72" fill="#f8fafc"/>

  <text x="68" y="230" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600"><tspan font-weight="700">XRD</tspan></text>
  <text x="68" y="246" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">X射线衍射</text>

  <text x="210" y="227" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">矿物物相鉴定</text>
  <text x="210" y="243" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">晶体结构参数</text>
  <text x="210" y="259" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">半定量矿物含量</text>

  <text x="430" y="227" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">物相鉴定金标准</text>
  <text x="430" y="243" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a"><tspan font-weight="700">Rietveld</tspan>定量分析成熟</text>
  <text x="430" y="259" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">数据库丰富(ICDD)</text>

  <text x="700" y="227" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">需粉末样品(有损)</text>
  <text x="700" y="243" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">对非晶相不敏感</text>
  <text x="700" y="259" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">无空间分辨能力</text>

  <text x="980" y="227" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">Xia等：龙山文化黑</text>
  <text x="980" y="243" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">陶矿物组成与<tspan font-weight="700">烧制</tspan></text>
  <text x="980" y="259" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">温度</tspan>重建</text>

  <line x1="60" y1="276" x2="1220" y2="276" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 3: 穆斯堡尔谱 (white bg) ===== -->
  <rect x="40" y="276" width="1200" height="72" fill="#ffffff"/>

  <text x="68" y="302" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600"><tspan font-weight="700">穆斯堡尔谱</tspan></text>
  <text x="68" y="318" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">Mössbauer</text>

  <text x="210" y="299" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a"><tspan font-weight="700">Fe²⁺/Fe³⁺</tspan>价态比</text>
  <text x="210" y="315" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">铁矿物种类鉴定</text>
  <text x="210" y="331" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">磁性参数</text>

  <text x="430" y="299" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">铁价态定量最精确</text>
  <text x="430" y="315" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">直接反映<tspan font-weight="700">烧制气氛</tspan></text>
  <text x="430" y="331" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">氧化/<tspan font-weight="700">还原</tspan>可定量区分</text>

  <text x="700" y="299" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">需约100mg粉末样品</text>
  <text x="700" y="315" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">设备昂贵且普及率低</text>
  <text x="700" y="331" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">测试周期较长(数小时)</text>

  <text x="980" y="299" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Ricciardi等</tspan>：尼泊尔</text>
  <text x="980" y="315" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">黑衣陶铁价态定量</text>
  <text x="980" y="331" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">与气氛重建</text>

  <line x1="60" y1="348" x2="1220" y2="348" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 4: SEM-EDS (alternating bg) ===== -->
  <rect x="40" y="348" width="1200" height="72" fill="#f8fafc"/>

  <text x="68" y="374" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600"><tspan font-weight="700">SEM-EDS</tspan></text>
  <text x="68" y="390" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">扫描电镜+能谱</text>

  <text x="210" y="371" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">形貌 + 元素分布</text>
  <text x="210" y="387" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">涂层/胎体界面</text>
  <text x="210" y="403" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">元素含量梯度</text>

  <text x="430" y="371" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">微区形貌+成分同步</text>
  <text x="430" y="387" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">线/面扫描信息丰富</text>
  <text x="430" y="403" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">图像直观易解读</text>

  <text x="700" y="371" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">需真空环境操作</text>
  <text x="700" y="387" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">制样有损(切片/喷碳)</text>
  <text x="700" y="403" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">轻元素(C)定量不精确</text>

  <text x="980" y="371" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Solard等</tspan>：雅典黑光</text>
  <text x="980" y="387" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">陶涂层微结构与元</text>
  <text x="980" y="403" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">素分布研究</text>

  <line x1="60" y1="420" x2="1220" y2="420" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 5: FTIR (white bg) ===== -->
  <rect x="40" y="420" width="1200" height="72" fill="#ffffff"/>

  <text x="68" y="446" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600"><tspan font-weight="700">FTIR</tspan></text>
  <text x="68" y="462" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">红外光谱</text>

  <text x="210" y="443" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">有机质(C-H,C=O)</text>
  <text x="210" y="459" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">矿物种类鉴定</text>
  <text x="210" y="475" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">吸附水/结构水</text>

  <text x="430" y="443" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">样品需求量极少(μg)</text>
  <text x="430" y="459" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">ATR模式近无损</text>
  <text x="430" y="475" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">测试快速(&lt;5min/样)</text>

  <text x="700" y="443" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">空间分辨率较低</text>
  <text x="700" y="459" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">水分干扰需特殊处理</text>
  <text x="700" y="475" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">混合物解析困难</text>

  <text x="980" y="443" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">Scarpelli等：当拉曼</text>
  <text x="980" y="459" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">受<tspan font-weight="700">荧光干扰</tspan>时用FTIR</text>
  <text x="980" y="475" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">替代完成物相鉴定</text>

  <line x1="60" y1="492" x2="1220" y2="492" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 6: PLM (alternating bg) ===== -->
  <rect x="40" y="492" width="1200" height="72" fill="#f8fafc"/>

  <text x="68" y="518" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600"><tspan font-weight="700">PLM</tspan></text>
  <text x="68" y="534" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">偏光显微镜</text>

  <text x="210" y="515" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">矿物种类/光学性质</text>
  <text x="210" y="531" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">矿物取向/排列</text>
  <text x="210" y="547" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">消光特征</text>

  <text x="430" y="515" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">设备简单、成本低</text>
  <text x="430" y="531" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">薄片制备后可无损观察</text>
  <text x="430" y="547" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">矿物鉴定直观可靠</text>

  <text x="700" y="515" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">定量能力有限</text>
  <text x="700" y="531" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">需薄片制样(微有损)</text>
  <text x="700" y="547" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">依赖操作者经验</text>

  <text x="980" y="515" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Kim等</tspan>：百济黑陶表</text>
  <text x="980" y="531" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">面矿物同步消光验</text>
  <text x="980" y="547" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">证<tspan font-weight="700">结构致黑</tspan></text>

  <line x1="60" y1="564" x2="1220" y2="564" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ===== Row 7: SR-μXRD (white bg) ===== -->
  <rect x="40" y="564" width="1200" height="72" fill="#ffffff"/>

  <text x="68" y="590" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">SR-μ<tspan font-weight="700">XRD</tspan></text>
  <text x="68" y="606" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">同步辐射微区衍射</text>

  <text x="210" y="587" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">微晶物相鉴定</text>
  <text x="210" y="603" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">涂层/胎体物相分布</text>
  <text x="210" y="619" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">晶粒尺寸/应变</text>

  <text x="430" y="587" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">空间分辨率≤10μm</text>
  <text x="430" y="603" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">无需粉碎样品</text>
  <text x="430" y="619" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">可原位分析涂层薄层</text>

  <text x="700" y="587" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">依赖同步辐射光源</text>
  <text x="700" y="603" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">机时申请难、周期长</text>
  <text x="700" y="619" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a">数据处理复杂</text>

  <text x="980" y="587" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a"><tspan font-weight="700">Cianchetta等</tspan>：黑光</text>
  <text x="980" y="603" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">陶涂层原位物相分</text>
  <text x="980" y="619" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a">析与工艺重建</text>

  <!-- Bottom note -->
  <text x="640" y="666" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a" text-anchor="middle" font-style="italic">注：每种方法均有其适用边界，可靠的工艺重建需要至少2-3种方法交叉验证</text>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">11</text>
</svg>