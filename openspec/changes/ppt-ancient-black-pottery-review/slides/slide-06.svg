<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="52" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="34" fill="#18181b" font-weight="700">还原焙烧（铁致黑）</text>
  <text x="60" y="78" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="15" fill="#71717a"><tspan font-weight="700">Fe₂O₃</tspan> → <tspan font-weight="700">Fe₃O₄</tspan> → FeO 的还原链</text>

  <!-- Main card -->
  <g filter="url(#shadow-md)">
    <rect x="60" y="100" width="920" height="580" rx="8" fill="#ffffff"/>
  </g>
  <rect x="60" y="100" width="4" height="580" rx="2" fill="#3b82f6"/>

  <!-- Section 1: 呈色机理 -->
  <text x="84" y="130" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="700">呈色机理</text>
  <line x1="84" y1="140" x2="956" y2="140" stroke="#f0f0f0" stroke-width="1"/>
  <text x="84" y="162" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="84" dy="0">• <tspan font-weight="700">还原焙烧</tspan>是最基础的黑陶呈色途径。在缺氧的窑炉气氛中，陶胎中的赤铁矿(<tspan font-weight="700">Fe₂O₃</tspan>)经历逐步</tspan>
    <tspan x="92" dy="20">还原：先转变为<tspan font-weight="700">磁铁矿</tspan>(Fe₃O₄)，进一步还原则生成方铁矿(FeO)，二者均呈黑色或深灰色。</tspan>
    <tspan x="84" dy="24">• 颜色深浅由两个因素共同决定：一是还原程度（即Fe²⁺/Fe³⁺比值），二是胎体的总铁含量。</tspan>
    <tspan x="92" dy="20">当原料<tspan font-weight="700">Fe₂O₃</tspan>含量超过5%且窑内氧分压足够低时，陶器可呈现接近纯黑的深灰色。</tspan>
    <tspan x="84" dy="24">• 冷却阶段必须持续隔绝氧气。若冷却过程中空气进入窑内，已形成的<tspan font-weight="700">Fe₃O₄</tspan>会重新氧化为</tspan>
    <tspan x="92" dy="20">Fe₂O₃，陶器表面由黑转红，即所谓「<tspan font-weight="700">返红</tspan>」现象，这是此类黑陶保存的主要技术难点。</tspan>
    <tspan x="84" dy="24">• 磁铁矿的稳定形成温度窗口为<tspan font-weight="700">700–900°C</tspan>，低于此温度还原反应动力学不足，超过此范围则</tspan>
    <tspan x="92" dy="20">可能出现过度烧结或其他矿相转变，因此窑温控制是该工艺的核心技术参数。</tspan>
  </text>

  <!-- Section 2: 关键研究 -->
  <text x="84" y="360" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="700">关键研究</text>
  <line x1="84" y1="370" x2="956" y2="370" stroke="#f0f0f0" stroke-width="1"/>
  <text x="84" y="392" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="84" dy="0">• <tspan font-weight="700">Nodari</tspan>等研究意大利伊特鲁里亚夹心陶，发现黑色外壳与红色内芯之间存在清晰的Fe²⁺/Fe³⁺</tspan>
    <tspan x="92" dy="20">浓度梯度，证明还原反应由外向内推进，外层还原充分而内部仍保持氧化态。</tspan>
    <tspan x="84" dy="24">• Maritan等指出原料中的有机质在升温阶段消耗周围氧气，能在陶胎内部营造局部还原微环境，</tspan>
    <tspan x="92" dy="20">这一机制是低温阶段（&lt;600°C）陶器开始变黑的重要辅助因素。</tspan>
    <tspan x="84" dy="24">• Lima等通过<tspan font-weight="700">穆斯堡尔谱学</tspan>(Mössbauer spectroscopy)系统测定了不同烧成温度和气氛条件下</tspan>
    <tspan x="92" dy="20">Fe²⁺与Fe³⁺的相对丰度，揭示铁价态变化与烧成条件之间并非简单的一一对应关系。</tspan>
    <tspan x="84" dy="24">• Xia等对永城龙山文化陶器进行<tspan font-weight="700">XRF+XRD</tspan>联合分析，发现深灰色陶器中<tspan font-weight="700">磁铁矿</tspan>的存在与强</tspan>
    <tspan x="92" dy="20">还原烧成条件一致，为中国史前灰陶的还原焙烧成因提供了直接矿物学证据。</tspan>
  </text>

  <!-- Section 3: 科技判别 -->
  <text x="84" y="568" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#3b82f6" font-weight="700">科技判别三项指标</text>
  <line x1="84" y1="578" x2="956" y2="578" stroke="#f0f0f0" stroke-width="1"/>
  <text x="84" y="600" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">
    <tspan x="84" dy="0">① <tspan font-weight="700">XRD</tspan>衍射谱中出现<tspan font-weight="700">磁铁矿</tspan>(Fe₃O₄)或方铁矿(FeO)的特征衍射峰，可直接确认还原铁矿物相。</tspan>
    <tspan x="84" dy="22">② 复烧实验：将样品在氧化气氛中重新加热至800°C以上，若颜色由黑恢复为红色，则确认铁致黑。</tspan>
    <tspan x="84" dy="22">③ 热重分析(<tspan font-weight="700">TGA</tspan>)升温过程中不出现由碳燃烧引起的明显失重台阶——此特征可将<tspan font-weight="700">还原焙烧</tspan>黑陶与<tspan font-weight="700">渗碳</tspan>黑陶区分开。</tspan>
  </text>

  <!-- Side metric card 1 -->
  <g filter="url(#shadow-md)">
    <rect x="1008" y="100" width="212" height="140" rx="8" fill="#ffffff"/>
  </g>
  <text x="1114" y="156" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="42" fill="#3b82f6" font-weight="700" text-anchor="middle">&gt;5%</text>
  <text x="1114" y="184" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#71717a" text-anchor="middle">Fe₂O₃ 含量阈值</text>
  <text x="1114" y="208" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a" text-anchor="middle" opacity="0.7">低于此值还原后仍偏灰</text>
  <text x="1114" y="226" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a" text-anchor="middle" opacity="0.7">难以达到深黑色</text>

  <!-- Side metric card 2 -->
  <g filter="url(#shadow-md)">
    <rect x="1008" y="260" width="212" height="140" rx="8" fill="#ffffff"/>
  </g>
  <text x="1114" y="314" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="34" fill="#3b82f6" font-weight="700" text-anchor="middle">700–900°C</text>
  <text x="1114" y="342" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#71717a" text-anchor="middle">磁铁矿形成温度</text>
  <text x="1114" y="366" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a" text-anchor="middle" opacity="0.7">低于此范围动力学不足</text>
  <text x="1114" y="384" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="11" fill="#71717a" text-anchor="middle" opacity="0.7">超过则发生相变</text>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">6</text>
</svg>