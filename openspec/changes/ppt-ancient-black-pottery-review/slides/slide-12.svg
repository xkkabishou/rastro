<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="32" fill="#27272a" font-weight="700">埋藏环境干扰</text>
  <text x="60" y="72" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="14" fill="#71717a">三类常见干扰因素可导致呈色机理的误判——分析前必须排查的"陷阱"</text>

  <!-- ==================== Card 1: 锰的二次沉积 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="40" y="96" width="386" height="590" rx="8" fill="#ffffff"/>
  </g>
  <rect x="40" y="96" width="386" height="4" rx="2" fill="#ef4444"/>

  <rect x="60" y="116" width="36" height="36" rx="18" fill="#ef4444" opacity="0.1"/>
  <text x="78" y="140" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ef4444" font-weight="700" text-anchor="middle">1</text>
  <text x="108" y="140" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#27272a" font-weight="600"><tspan font-weight="700">锰</tspan>的二次沉积</text>
  <text x="108" y="158" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">Secondary Mn Deposition</text>

  <line x1="60" y1="170" x2="406" y2="170" stroke="#f0f0f0" stroke-width="1"/>

  <text x="60" y="192" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">形成机理</text>
  <text x="60" y="212" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">土壤中的溶解态<tspan font-weight="700">Mn²⁺</tspan>离子在氧化条件下（如</text>
  <text x="60" y="228" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">地下水位波动带），可在陶器表面沉积形成黑</text>
  <text x="60" y="244" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">色<tspan font-weight="700">MnOx</tspan>薄膜或不规则斑块。沉积过程受土壤</text>
  <text x="60" y="260" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">pH值、氧化还原电位（Eh）和微生物活动共</text>
  <text x="60" y="276" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">同控制。</text>

  <text x="60" y="302" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">误判风险</text>
  <text x="60" y="322" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">MnOx薄膜的黑色外观与<tspan font-weight="700">渗碳</tspan>层极为相似，肉</text>
  <text x="60" y="338" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">眼无法区分。若不经化学分析直接判断为渗碳</text>
  <text x="60" y="354" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">或<tspan font-weight="700">还原</tspan>致色，将导致工艺解读完全错误。</text>

  <line x1="60" y1="374" x2="406" y2="374" stroke="#f0f0f0" stroke-width="1"/>

  <text x="60" y="396" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">关键文献</text>
  <text x="60" y="416" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">De Vito等</text>
  <text x="60" y="434" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">西西里莫提亚(Motya)遗址黑光陶研究中发</text>
  <text x="60" y="450" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">现，部分样品表面黑色区域实为埋藏期间沉积</text>
  <text x="60" y="466" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">的<tspan font-weight="700">锰氧化物</tspan>，并非原始黑光涂层。该发现颠覆</text>
  <text x="60" y="482" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">了此前仅凭外观判断的工艺分类。</text>

  <line x1="60" y1="500" x2="406" y2="500" stroke="#f0f0f0" stroke-width="1"/>

  <text x="60" y="522" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">识别方法</text>
  <text x="60" y="542" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a"><tspan font-weight="700">EDS</tspan>面扫描中<tspan font-weight="700">Mn元素</tspan>异常富集（原始陶器Mn</text>
  <text x="60" y="558" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">含量通常极低）。分布往往呈斑状、不均匀，</text>
  <text x="60" y="574" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">与陶器自身烧制产生的均匀涂层形成对比。</text>
  <text x="60" y="590" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">便携<tspan font-weight="700">XRF</tspan>可作为初筛手段快速检出Mn异常。</text>

  <!-- ==================== Card 2: 有机质次生吸附 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="446" y="96" width="388" height="590" rx="8" fill="#ffffff"/>
  </g>
  <rect x="446" y="96" width="388" height="4" rx="2" fill="#f59e0b"/>

  <rect x="466" y="116" width="36" height="36" rx="18" fill="#f59e0b" opacity="0.1"/>
  <text x="484" y="140" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#f59e0b" font-weight="700" text-anchor="middle">2</text>
  <text x="514" y="140" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#27272a" font-weight="600">有机质次生吸附</text>
  <text x="514" y="158" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">Secondary Organic Absorption</text>

  <line x1="466" y1="170" x2="814" y2="170" stroke="#f0f0f0" stroke-width="1"/>

  <text x="466" y="192" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">形成机理</text>
  <text x="466" y="212" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">土壤中的<tspan font-weight="700">腐殖酸</tspan>(humic acid)、富里酸等有机</text>
  <text x="466" y="228" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">物质可通过毛细作用渗入陶器表面气孔和微裂</text>
  <text x="466" y="244" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">隙。这些有机物在数百至数千年的埋藏过程中</text>
  <text x="466" y="260" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">逐渐在陶器表层富集，可使浅色表面变为棕黑</text>
  <text x="466" y="276" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">色调。</text>

  <text x="466" y="302" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">分析干扰</text>
  <text x="466" y="322" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">吸附的有机质在<tspan font-weight="700">拉曼</tspan>分析中产生强烈的<tspan font-weight="700">荧光</tspan>效</text>
  <text x="466" y="338" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">应，严重掩盖碳的D/G特征峰信号。这可能导</text>
  <text x="466" y="354" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">致实际含碳(<tspan font-weight="700">渗碳</tspan>)的黑陶被误判为非碳致色，</text>
  <text x="466" y="370" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">因为碳的信号被<tspan font-weight="700">荧光干扰</tspan>背景淹没。</text>

  <line x1="466" y1="390" x2="814" y2="390" stroke="#f0f0f0" stroke-width="1"/>

  <text x="466" y="412" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">关键文献</text>
  <text x="466" y="432" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">Scarpelli等</text>
  <text x="466" y="450" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">庞贝城黑涂层陶器的拉曼分析中遭遇严重荧光</text>
  <text x="466" y="466" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">背景干扰，无法通过常规拉曼获取有效碳信号。</text>
  <text x="466" y="482" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">研究团队不得不改用<tspan font-weight="700">FTIR</tspan> + <tspan font-weight="700">SEM-EDS</tspan>联合方</text>
  <text x="466" y="498" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">案完成物相鉴定。</text>

  <line x1="466" y1="516" x2="814" y2="516" stroke="#f0f0f0" stroke-width="1"/>

  <text x="466" y="538" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">解决方案</text>
  <text x="466" y="558" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">① 更换激发波长(<tspan font-weight="700">785nm</tspan>或<tspan font-weight="700">1064nm</tspan>近红外)</text>
  <text x="466" y="576" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">② 结合<tspan font-weight="700">FTIR</tspan>替代拉曼进行有机/无机鉴别</text>
  <text x="466" y="594" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">③ <tspan font-weight="700">SEM-EDS</tspan>验证碳含量梯度分布</text>
  <text x="466" y="612" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">④ 必要时进行样品表层微清洗后再分析</text>

  <!-- ==================== Card 3: 钙质结壳 ==================== -->
  <g filter="url(#shadow-md)">
    <rect x="854" y="96" width="386" height="590" rx="8" fill="#ffffff"/>
  </g>
  <rect x="854" y="96" width="386" height="4" rx="2" fill="#8b5cf6"/>

  <rect x="874" y="116" width="36" height="36" rx="18" fill="#8b5cf6" opacity="0.1"/>
  <text x="892" y="140" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="16" fill="#8b5cf6" font-weight="700" text-anchor="middle">3</text>
  <text x="922" y="140" font-family="Instrument Serif, Georgia, 'PingFang SC', serif" font-size="18" fill="#27272a" font-weight="600"><tspan font-weight="700">钙质结壳</tspan></text>
  <text x="922" y="158" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">Calcareous Encrustation</text>

  <line x1="874" y1="170" x2="1220" y2="170" stroke="#f0f0f0" stroke-width="1"/>

  <text x="874" y="192" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">形成机理</text>
  <text x="874" y="212" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">在碳酸钙饱和的土壤环境中，溶解态<tspan font-weight="700">Ca²⁺</tspan>与</text>
  <text x="874" y="228" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">CO₃²⁻重新沉淀形成<tspan font-weight="700">CaCO₃</tspan>（方解石）结壳，</text>
  <text x="874" y="244" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">覆盖在陶器表面。结壳厚度从微米级薄膜到毫</text>
  <text x="874" y="260" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">米级硬壳不等，与陶器表面结合紧密。</text>

  <text x="874" y="286" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">分析干扰</text>
  <text x="874" y="306" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">CaCO₃结壳覆盖原始陶器表面，严重干扰表面</text>
  <text x="874" y="322" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">化学成分测定。<tspan font-weight="700">XRF</tspan>/<tspan font-weight="700">EDS</tspan>测得的Ca含量偏高，</text>
  <text x="874" y="338" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">稀释其他元素信号，可能掩盖涂层的真实Fe或</text>
  <text x="874" y="354" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">C含量。同时影响色度测量的准确性。</text>

  <line x1="874" y1="374" x2="1220" y2="374" stroke="#f0f0f0" stroke-width="1"/>

  <text x="874" y="396" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">关键文献</text>
  <text x="874" y="416" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a" font-weight="600">Laciak等</text>
  <text x="874" y="434" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">中欧史前黑涂层陶器研究中明确指出<tspan font-weight="700">钙质结壳</tspan></text>
  <text x="874" y="450" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">对表面分析的干扰问题。建议在任何表面化学</text>
  <text x="874" y="466" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">分析之前，必须先在体视显微镜下仔细鉴定是</text>
  <text x="874" y="482" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#71717a">否存在二次沉积物。</text>

  <line x1="874" y1="500" x2="1220" y2="500" stroke="#f0f0f0" stroke-width="1"/>

  <text x="874" y="522" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#3b82f6" font-weight="600">处理建议</text>
  <text x="874" y="542" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">① 体视显微镜下鉴定结壳范围与厚度</text>
  <text x="874" y="560" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">② 机械微清理（手术刀/针尖）小心去除</text>
  <text x="874" y="578" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">③ 稀盐酸(<tspan font-weight="700">5% HCl</tspan>)局部溶解（需极谨慎，</text>
  <text x="874" y="594" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">   避免酸液渗入损伤原始涂层）</text>
  <text x="874" y="612" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">④ 清理前后分别拍照记录、分析比对</text>
  <text x="874" y="632" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="13" fill="#27272a">⑤ 优先在断面而非外表面进行分析</text>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', sans-serif" font-size="12" fill="#27272a" opacity="0.3" text-anchor="end">12</text>
</svg>