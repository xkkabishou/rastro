<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <filter id="card-shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.03"/>
    </filter>
    <filter id="card-shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#hero-bg)"/>

  <!-- Title area -->
  <text x="60" y="100"
        font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
        font-size="40" font-weight="700" fill="#18181b" letter-spacing="1">
    目录
  </text>
  <!-- Accent underline -->
  <rect x="60" y="116" width="56" height="3" rx="1.5" fill="#3b82f6"/>

  <!-- Section 1 -->
  <g transform="translate(60, 178)">
    <rect x="0" y="0" width="1160" height="80" rx="8" fill="#ffffff" filter="url(#card-shadow-md)"/>
    <!-- Number circle -->
    <circle cx="40" cy="40" r="18" fill="#3b82f6"/>
    <text x="40" y="46" text-anchor="middle"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="18" font-weight="700" fill="#ffffff">
      01
    </text>
    <!-- Section title -->
    <text x="76" y="34"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="24" fill="#18181b" font-weight="600">
      引言与背景
    </text>
    <!-- Description -->
    <text x="76" y="58"
          font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#71717a">
      黑陶研究的学术脉络与科技考古视角
    </text>
    <!-- Subtle right accent bar -->
    <rect x="1132" y="20" width="4" height="40" rx="2" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Section 2 -->
  <g transform="translate(60, 278)">
    <rect x="0" y="0" width="1160" height="80" rx="8" fill="#ffffff" filter="url(#card-shadow-md)"/>
    <circle cx="40" cy="40" r="18" fill="#3b82f6"/>
    <text x="40" y="46" text-anchor="middle"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="18" font-weight="700" fill="#ffffff">
      02
    </text>
    <text x="76" y="34"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="24" fill="#18181b" font-weight="600">
      黑陶分类体系
    </text>
    <text x="76" y="58"
          font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#71717a">
      按呈色机制的系统分类方法
    </text>
    <rect x="1132" y="20" width="4" height="40" rx="2" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Section 3 -->
  <g transform="translate(60, 378)">
    <rect x="0" y="0" width="1160" height="80" rx="8" fill="#ffffff" filter="url(#card-shadow-md)"/>
    <circle cx="40" cy="40" r="18" fill="#3b82f6"/>
    <text x="40" y="46" text-anchor="middle"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="18" font-weight="700" fill="#ffffff">
      03
    </text>
    <text x="76" y="34"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="24" fill="#18181b" font-weight="600">
      研究方法体系
    </text>
    <text x="76" y="58"
          font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#71717a">
      科技分析手段与实验考古路径
    </text>
    <rect x="1132" y="20" width="4" height="40" rx="2" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Section 4 -->
  <g transform="translate(60, 478)">
    <rect x="0" y="0" width="1160" height="80" rx="8" fill="#ffffff" filter="url(#card-shadow-md)"/>
    <circle cx="40" cy="40" r="18" fill="#3b82f6"/>
    <text x="40" y="46" text-anchor="middle"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="18" font-weight="700" fill="#ffffff">
      04
    </text>
    <text x="76" y="34"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="24" fill="#18181b" font-weight="600">
      误判与挑战
    </text>
    <text x="76" y="58"
          font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#71717a">
      研究中的常见陷阱与方法论反思
    </text>
    <rect x="1132" y="20" width="4" height="40" rx="2" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Section 5 -->
  <g transform="translate(60, 578)">
    <rect x="0" y="0" width="1160" height="80" rx="8" fill="#ffffff" filter="url(#card-shadow-md)"/>
    <circle cx="40" cy="40" r="18" fill="#3b82f6"/>
    <text x="40" y="46" text-anchor="middle"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="18" font-weight="700" fill="#ffffff">
      05
    </text>
    <text x="76" y="34"
          font-family="Instrument Serif, Georgia, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', serif"
          font-size="24" fill="#18181b" font-weight="600">
      展望与结语
    </text>
    <text x="76" y="58"
          font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#71717a">
      未来研究方向与学科融合趋势
    </text>
    <rect x="1132" y="20" width="4" height="40" rx="2" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Page number -->
  <text x="1220" y="700" text-anchor="end"
        font-family="Work Sans, Inter, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
        font-size="12" fill="#18181b" opacity="0.3">
    02
  </text>
</svg>