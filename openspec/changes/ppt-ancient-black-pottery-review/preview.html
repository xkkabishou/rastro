<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古代黑陶烧制工艺科技考古综述</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: var(--accent, #3b82f6);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .header-title span { color: var(--accent, #3b82f6); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  .slide-counter {
    background: rgba(255, 255, 255, 0.06);
    color: var(--accent, #3b82f6);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  .mode-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .mode-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .mode-btn.active {
    background: var(--accent, #3b82f6);
    border-color: var(--accent, #3b82f6);
  }

  /* ── Gallery Mode ── */
  .gallery {
    padding: 80px 32px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .slide-card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .slide-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  }

  .slide-card .slide-number {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    color: var(--accent, #3b82f6);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .slide-card .slide-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 32px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .slide-card:hover .slide-label { opacity: 1; }

  .slide-card object,
  .slide-card img {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    pointer-events: none;
  }

  /* ── Scroll Mode ── */
  .scroll-view {
    display: none;
    padding: 80px 0 40px;
  }

  .scroll-view.active { display: block; }

  .scroll-slide {
    max-width: 960px;
    margin: 0 auto 24px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .scroll-slide object { width: 100%; display: block; }

  .scroll-slide .scroll-number {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: var(--accent, #3b82f6);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }

  /* ── Presentation Mode ── */
  .presentation {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
  }

  .presentation.active {
    display: flex;
    flex-direction: column;
  }

  .pres-toolbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 210;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(16px);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .presentation:hover .pres-toolbar { opacity: 1; }

  .pres-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .pres-btn:hover { background: rgba(255,255,255,0.2); }

  .pres-progress {
    flex: 1;
    max-width: 400px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .pres-progress-bar {
    height: 100%;
    background: var(--accent, #3b82f6);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .pres-counter {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    text-align: center;
  }

  .pres-slide-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .pres-slide-container object {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 4px;
    box-shadow: 0 4px 60px rgba(0,0,0,0.5);
  }

  /* ── Keyboard Hint ── */
  .kbd-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
  }

  .kbd-hint kbd {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }

  /* ── Notes Panel ── */
  .notes-panel {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 0;
    right: 0;
    z-index: 220;
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 16px 32px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.8);
  }

  .notes-panel.active { display: block; }

  .notes-panel .notes-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent, #3b82f6);
    margin-bottom: 8px;
  }

  .notes-panel .notes-label {
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">陶</div>
    <div class="header-title"><span>黑陶综述</span> PPT</div>
  </div>
  <div class="header-right">
    <span class="slide-counter" id="slideCounter"></span>
    <button class="mode-btn active" onclick="setMode('gallery')">Gallery</button>
    <button class="mode-btn" onclick="setMode('scroll')">Scroll</button>
    <button class="mode-btn" onclick="startPresentation(0)">Present</button>
  </div>
</div>

<!-- Gallery Mode -->
<div class="gallery" id="galleryView">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- Scroll Mode -->
<div class="scroll-view" id="scrollView"></div>

<!-- Presentation Mode -->
<div class="presentation" id="presView">
  <div class="pres-slide-container" id="presSlide"></div>
  <div class="notes-panel" id="notesPanel">
    <div class="notes-title">Speaker Notes</div>
    <div class="notes-label" id="notesContent"></div>
  </div>
  <div class="pres-toolbar">
    <button class="pres-btn" onclick="presNav(-1)">&#8592;</button>
    <div class="pres-progress"><div class="pres-progress-bar" id="presProgress"></div></div>
    <span class="pres-counter" id="presCounter"></span>
    <button class="pres-btn" onclick="presNav(1)">&#8594;</button>
    <button class="pres-btn" onclick="exitPresentation()">&#10005;</button>
  </div>
</div>

<!-- Keyboard Hints -->
<div class="kbd-hint" id="kbdHint">
  <kbd>F</kbd> Fullscreen &nbsp; <kbd>P</kbd> Present &nbsp; <kbd>G</kbd> Gallery &nbsp; <kbd>S</kbd> Scroll &nbsp; <kbd>N</kbd> Notes
</div>

<script>
const SLIDES = [
  { "file": "slides/slide-01.svg", "label": "封面 — 古代黑陶烧制工艺科技考古综述", "notes": "欢迎各位老师同学，我是贾煜琪，今天汇报我的课程论文——古代黑陶烧制工艺的科技考古综述。" },
  { "file": "slides/slide-02.svg", "label": "目录", "notes": "今天的汇报分为五个部分：引言与背景、黑陶分类体系、研究方法体系、误判与挑战、展望与结语。" },
  { "file": "slides/slide-03.svg", "label": "黑陶：跨越六千年的黑色工艺", "notes": "黑陶在中国新石器时代中晚期和地中海古典时期都有大量发现。龙山文化蛋壳黑陶是最负盛名的代表，有「黑如漆、薄如纸、亮如镜、硬如瓷」的美誉。地中海黑光陶采用完全不同的工艺路线。" },
  { "file": "slides/slide-04.svg", "label": "中西方黑陶的本质差异", "notes": "中国黑陶以碳为呈色物质，地中海以铁氧化物为呈色物质。这一本质差异决定了完全不同的科技判别路径。本文正是从这一分歧出发，建立四大分类体系。" },
  { "file": "slides/slide-05.svg", "label": "四大工艺类型总览", "notes": "这是论文的核心创新点——以呈色物理化学本质为分类主干。四大类型覆盖了中国和地中海的主要黑陶类型。实际考古遗物中两种甚至三种工艺叠加并不罕见。" },
  { "file": "slides/slide-06.svg", "label": "还原焙烧（铁致黑）", "notes": "还原焙烧是最基础也最古老的黑陶呈色途径。核心判别：XRD磁铁矿峰 + 复烧变红 + 热重无碳燃烧失重。Nodari等在意大利伊特鲁里亚夹心陶中发现了Fe²⁺/Fe³⁺梯度。" },
  { "file": "slides/slide-07.svg", "label": "渗碳（碳致黑）", "notes": "渗碳是中国黑陶研究中最核心的工艺类型。刘鹏的实验表明630°C以下粘土矿物仍保留层间水，吸附能力最强。拉曼光谱D/G峰和EDS碳梯度线扫描是核心判别手段。" },
  { "file": "slides/slide-08.svg", "label": "三段式烧成（晶相致黑）", "notes": "三段式烧成是地中海黑光陶的核心工艺。关键在于涂层与胎体对氧气渗透的差异响应——涂层致密烧结后阻止氧气再进入，而胎体疏松则重新氧化变红。" },
  { "file": "slides/slide-09.svg", "label": "抛光（结构致黑）", "notes": "结构致黑是最容易被忽视的一种机制。百济汉城期黑陶是最典型的案例——Kim等未检测到碳沉积或涂层，呈色完全归因于矿物定向排列。" },
  { "file": "slides/slide-10.svg", "label": "层级化分析方法体系", "notes": "方法体系从无损到微区定量层层递进。无损筛查适用于所有工艺类型的初步判断，微区定量为精确判定提供核心数据。" },
  { "file": "slides/slide-11.svg", "label": "主要分析方法比较", "notes": "没有一种方法能够解决所有问题，需要多方法联用。拉曼和SEM-EDS是使用最广泛的组合。穆斯堡尔谱对还原焙烧黑陶的判别尤为关键。" },
  { "file": "slides/slide-12.svg", "label": "埋藏环境干扰", "notes": "De Vito等在西西里莫提亚遗址发现部分黑色区域实为埋藏期锰氧化物沉积。Scarpelli等在庞贝遇到严重荧光干扰，最终靠FTIR+SEM-EDS解决。" },
  { "file": "slides/slide-13.svg", "label": "工艺多解性难题", "notes": "仅凭XRD检测到磁铁矿无法判断是整体还原还是涂层局部还原。鲁晓珂等发现良渚黑陶工艺比预想更复杂。多元互证原则是应对工艺多解性的核心策略。" },
  { "file": "slides/slide-14.svg", "label": "新兴技术与未来展望", "notes": "这些新技术的共同方向是原位、无损、高空间分辨率。Reedy等用Micro-CT表征了42个孔隙参数，26个与烧成温度显著相关。" },
  { "file": "slides/slide-15.svg", "label": "中西方工艺的平行之路", "notes": "中西方黑陶工艺是人类制陶技术演进的两条平行路线。虽然具体做法不同，本质上都是对窑炉气氛和表面微观结构的精密控制。这种跨文化比较正是科技考古的独特价值。" },
  { "file": "slides/slide-16.svg", "label": "感谢聆听", "notes": "以上就是我的汇报内容，请各位老师同学批评指正。谢谢！" }
];

const TOTAL = SLIDES.length;
const ACCENT = '#3b82f6';

document.documentElement.style.setProperty('--accent', ACCENT);
document.getElementById('slideCounter').textContent = `${TOTAL} slides`;

// ── Build Gallery ──
const galleryGrid = document.getElementById('galleryGrid');
SLIDES.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'slide-card';
  card.onclick = () => startPresentation(i);
  card.innerHTML = `
    <div class="slide-number">${String(i + 1).padStart(2, '0')}</div>
    <object data="${s.file}" type="image/svg+xml"></object>
    <div class="slide-label">${s.label}</div>
  `;
  galleryGrid.appendChild(card);
});

// ── Build Scroll View ──
const scrollView = document.getElementById('scrollView');
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'scroll-slide';
  div.innerHTML = `
    <div class="scroll-number">${String(i + 1).padStart(2, '0')} / ${TOTAL}</div>
    <object data="${s.file}" type="image/svg+xml"></object>
  `;
  scrollView.appendChild(div);
});

// ── Mode Switching ──
let currentMode = 'gallery';
function setMode(mode) {
  currentMode = mode;
  document.getElementById('galleryView').style.display = mode === 'gallery' ? 'block' : 'none';
  document.getElementById('scrollView').className = mode === 'scroll' ? 'scroll-view active' : 'scroll-view';
  document.getElementById('kbdHint').style.display = (mode === 'gallery' || mode === 'scroll') ? 'block' : 'none';
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
  });
  if (mode !== 'presentation') {
    document.getElementById('presView').classList.remove('active');
  }
}

// ── Presentation Mode ──
let presIndex = 0;

function startPresentation(index) {
  presIndex = index || 0;
  document.getElementById('presView').classList.add('active');
  document.getElementById('kbdHint').style.display = 'none';
  renderPresSlide();
}

function exitPresentation() {
  document.getElementById('presView').classList.remove('active');
  document.getElementById('kbdHint').style.display = 'block';
}

function presNav(dir) {
  presIndex = Math.max(0, Math.min(TOTAL - 1, presIndex + dir));
  renderPresSlide();
}

function renderPresSlide() {
  const container = document.getElementById('presSlide');
  const notesVisible = document.getElementById('notesPanel').classList.contains('active');
  const maxH = notesVisible ? 'calc(100vh - 260px)' : 'calc(100vh - 80px)';
  container.innerHTML = `<object data="${SLIDES[presIndex].file}" type="image/svg+xml" style="width:100%;max-height:${maxH};"></object>`;
  document.getElementById('presCounter').textContent = `${presIndex + 1} / ${TOTAL}`;
  document.getElementById('presProgress').style.width = `${((presIndex + 1) / TOTAL) * 100}%`;
  updateNotesContent();
}

// ── Notes Panel ──
let notesVisible = false;

function toggleNotes() {
  notesVisible = !notesVisible;
  document.getElementById('notesPanel').classList.toggle('active', notesVisible);
  renderPresSlide();
}

function updateNotesContent() {
  const el = document.getElementById('notesContent');
  const slide = SLIDES[presIndex];
  el.innerHTML = slide.notes || `Slide ${presIndex + 1}: ${slide.label}`;
}

// ── Keyboard Controls ──
document.addEventListener('keydown', (e) => {
  const pres = document.getElementById('presView').classList.contains('active');
  if (pres) {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); presNav(1); }
    else if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); presNav(-1); }
    else if (e.key === 'Escape') { exitPresentation(); }
    else if (e.key === 'n' || e.key === 'N') { toggleNotes(); }
    else if (e.key === 'Home') { presIndex = 0; renderPresSlide(); }
    else if (e.key === 'End') { presIndex = TOTAL - 1; renderPresSlide(); }
  } else {
    if (e.key === 'p' || e.key === 'P') startPresentation(0);
    else if (e.key === 'g' || e.key === 'G') setMode('gallery');
    else if (e.key === 's' || e.key === 'S') setMode('scroll');
    else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  }
});
</script>
</body>
</html>
