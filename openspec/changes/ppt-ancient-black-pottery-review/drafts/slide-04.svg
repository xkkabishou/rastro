<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="95" font-family="Instrument Serif, Georgia, 'PingFang SC', 'Microsoft YaHei', serif"
        font-size="36" font-weight="700" fill="#18181b">
    中西方黑陶的本质差异
  </text>

  <!-- Subtitle -->
  <text x="60" y="130" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#71717a">
    相似外观下的不同物理化学机制
  </text>

  <!-- Accent line -->
  <rect x="60" y="148" width="40" height="3" rx="1.5" fill="#3b82f6"/>

  <!-- LEFT CARD — 中国黑陶 -->
  <g transform="translate(60, 185)">
    <rect x="0" y="0" width="562" height="470" rx="8" fill="#ffffff" filter="url(#shadow)"/>

    <!-- Card header -->
    <rect x="0" y="0" width="562" height="56" rx="8" fill="#18181b"/>
    <rect x="0" y="28" width="562" height="28" fill="#18181b"/>
    <text x="24" y="37" font-family="Instrument Serif, Georgia, 'PingFang SC', 'Microsoft YaHei', serif"
          font-size="22" font-weight="700" fill="#fafafa">
      中国黑陶
    </text>
    <text x="130" y="37" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#a1a1aa">
      Carbon-based Black
    </text>

    <!-- Row 1: 呈色物质 -->
    <g transform="translate(24, 84)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        呈色物质
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        游离碳（炭黑）
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        有机质不完全燃烧产生的碳颗粒沉积
      </text>
    </g>
    <line x1="24" y1="156" x2="538" y2="156" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 2: 核心工艺 -->
    <g transform="translate(24, 178)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        核心工艺
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        封窑渗碳
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        还原气氛下碳元素渗入坯体表面
      </text>
    </g>
    <line x1="24" y1="250" x2="538" y2="250" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 3: 表面处理 -->
    <g transform="translate(24, 272)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        表面处理
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        碳沉积填充气孔
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        磨光压实后渗碳，形成致密黑色表层
      </text>
    </g>
    <line x1="24" y1="344" x2="538" y2="344" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 4: 物理性能 -->
    <g transform="translate(24, 366)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        物理性能
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        致密度提高
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        气孔率降低，吸水率下降，强度增加
      </text>
    </g>
  </g>

  <!-- RIGHT CARD — 地中海黑陶 -->
  <g transform="translate(658, 185)">
    <rect x="0" y="0" width="562" height="470" rx="8" fill="#ffffff" filter="url(#shadow)"/>

    <!-- Card header -->
    <rect x="0" y="0" width="562" height="56" rx="8" fill="#3b82f6"/>
    <rect x="0" y="28" width="562" height="28" fill="#3b82f6"/>
    <text x="24" y="37" font-family="Instrument Serif, Georgia, 'PingFang SC', 'Microsoft YaHei', serif"
          font-size="22" font-weight="700" fill="#fafafa">
      地中海黑陶
    </text>
    <text x="148" y="37" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="rgba(255,255,255,0.7)">
      Magnetite-based Black
    </text>

    <!-- Row 1: 呈色物质 -->
    <g transform="translate(24, 84)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        呈色物质
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        磁铁矿微晶
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        Fe₃O₄ 在还原气氛中结晶形成黑色
      </text>
    </g>
    <line x1="24" y1="156" x2="538" y2="156" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 2: 核心工艺 -->
    <g transform="translate(24, 178)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        核心工艺
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        三段式烧成
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        氧化→还原→再氧化，精确控温控气氛
      </text>
    </g>
    <line x1="24" y1="250" x2="538" y2="250" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 3: 表面处理 -->
    <g transform="translate(24, 272)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        表面处理
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        富铁涂层玻化
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        细化含铁泥浆涂层在高温下烧结玻化
      </text>
    </g>
    <line x1="24" y1="344" x2="538" y2="344" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Row 4: 物理性能 -->
    <g transform="translate(24, 366)">
      <text x="0" y="0" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#71717a" font-weight="600" letter-spacing="0.5">
        物理性能
      </text>
      <text x="0" y="30" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#27272a" font-weight="500">
        耐磨性突出
      </text>
      <text x="0" y="54" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="14" fill="#71717a">
        玻化涂层硬度高，抗磨损性能优异
      </text>
    </g>
  </g>

  <!-- VS divider -->
  <g transform="translate(622, 380)">
    <circle cx="18" cy="18" r="22" fill="#fafafa" stroke="#e4e4e7" stroke-width="1.5"/>
    <text x="18" y="24" text-anchor="middle"
          font-family="Instrument Serif, Georgia, serif"
          font-size="16" font-weight="700" fill="#3b82f6">
      VS
    </text>
  </g>

  <!-- Page number -->
  <text x="1220" y="700" font-family="Work Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="14" fill="#71717a" text-anchor="end">
    04
  </text>
</svg>